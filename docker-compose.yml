version: '2'

services:
    php:
        build: ./${PHP_VERSION}
        volumes_from:
            - source
        links:
            - db
        networks:
            - bitrix
        #restart: always
    web_server:
        build: ./${WEB_SERVER_TYPE}
        depends_on:
            - source
        volumes_from:
            - source
        ports:
            - '${INTERFACE}:${PROJECT_PORT}:80'
            - '${INTERFACE}:${PROJECT_PORT_SSL}:443'
        links:
            - php
        networks:
            - bitrix
        #restart: always
    db:
        build: ./${DB_SERVER_TYPE}
        platform: linux/amd64
        volumes_from:
            - source
        ports:
            - '${INTERFACE}:${DB_PORT}:3306'
        environment:
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
        command: mysqld --sql-mode="" --default-authentication-plugin=mysql_native_password
        networks:
            - bitrix
       # restart: always
    source:
        image: alpine:latest
        volumes:
            - ./logs/${WEB_SERVER_TYPE}:/var/log/${WEB_SERVER_TYPE}
            - ./logs/php:/var/log/php
            - ./logs/db:/var/log/mysql
            - db:/var/lib/mysql
            - ./www:/var/www
            - ./${PHP_VERSION}/php.ini:/etc/php/${PHP_NUMBER}/fpm/conf.d/90-php.ini
            - ./${PHP_VERSION}/php.ini:/etc/php/${PHP_NUMBER}/cli/conf.d/90-php.ini
            - ./mstp/msmtprc:/etc/msmtprc
        networks:
            - bitrix

volumes:
    db:
        driver: local
    cache:
        driver: local

networks:
    bitrix:
        driver: bridge
